name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install development tools
        run: python -m pip install --upgrade pip 'ruff>=0.9,<1'
      - name: Check Python formatting and quality
        run: ruff check scripts tests
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Check local Markdown links
        run: python scripts/check_markdown_links.py
      - name: Smoke-test evaluation CLI
        run: python scripts/score_vlm_eval.py --eval evaluation/eval-template.jsonl --predictions evaluation/sample-predictions.jsonl
